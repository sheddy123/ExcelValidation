# Builds, tests, and packs the excel-validator NuGet package.
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

# ubuntu-latest, so a cross-platform package is proven to build cross-platform.
pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  solution: 'ExcelValidator.sln'

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 8 SDK'
    inputs:
      packageType: 'sdk'
      version: '8.0.x'

  - task: DotNetCoreCLI@2
    displayName: 'Restore'
    inputs:
      command: 'restore'
      projects: '$(solution)'

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: 'build'
      projects: '$(solution)'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Test'
    inputs:
      command: 'test'
      projects: '**/*Tests.csproj'
      arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
      publishTestResults: true

  - task: DotNetCoreCLI@2
    displayName: 'Pack'
    inputs:
      command: 'pack'
      packagesToPack: 'ExcelValidator/ExcelValidator.csproj'
      configuration: '$(buildConfiguration)'
      nobuild: true
      versioningScheme: 'off'

  - publish: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Publish package artifact'
    artifact: 'nupkg'

  # Pushing is gated on a version tag so that packing stays part of every build while
  # publishing to nuget.org only happens when a release is tagged.
  - script: |
      dotnet nuget push "$(Build.ArtifactStagingDirectory)/**/*.nupkg" \
        --api-key $(APIKEY) \
        --source https://api.nuget.org/v3/index.json \
        --skip-duplicate
    displayName: Push package to NuGet
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
